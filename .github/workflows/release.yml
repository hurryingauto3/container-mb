# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize & publish DMG
    runs-on: macos-14
    env:
      # Provide these repository secrets to produce a Developer ID-signed,
      # notarized DMG. If absent, the build is ad-hoc signed (works, but
      # Gatekeeper will warn on download). See SECURITY.md.
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the build number (commit count) is correct

      - name: Verify tag matches AppVersion
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          SRC="$(sed -n 's/.*marketing = "\([0-9][0-9.]*\)".*/\1/p' Sources/ContainerCore/AppVersion.swift | head -1)"
          echo "tag=$TAG source=$SRC"
          if [ "$TAG" != "$SRC" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match AppVersion.marketing ($SRC)"
            exit 1
          fi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID certificate
        if: env.MACOS_CERTIFICATE_BASE64 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build & package DMG
        run: |
          if [ -n "$MACOS_SIGN_IDENTITY" ]; then
            export SIGN_IDENTITY="$MACOS_SIGN_IDENTITY"
          fi
          make dmg

      - name: Notarize & staple
        if: env.APPLE_ID != ''
        run: |
          DMG="$(ls dist/*.dmg | head -1)"
          echo "Notarizing $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ## Install

            1. Download `ContainerMenuBar-<version>.dmg` below.
            2. Open it and drag **ContainerMenuBar** into **Applications**.
            3. Launch it from Applications or Spotlight.

            Requires macOS 13+ and Apple's `container` CLI (`container system start`).

            > If this build is not yet notarized, macOS may warn on first launch —
            > right-click the app → Open, or see SECURITY.md.
